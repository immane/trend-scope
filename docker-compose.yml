services:
  mysql:
    image: mysql:8.0
    container_name: trend-scope-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-trend_scope}
      MYSQL_USER: ${MYSQL_USER:-trendscope}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-trendscope123}
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
      - --max_allowed_packet=256M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - trend-scope-network

  redis:
    image: redis:7-alpine
    container_name: trend-scope-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - trend-scope-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: trend-scope-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
    environment:
      APP_ENV: ${APP_ENV:-development}
      DATABASE_URL: mysql+asyncmy://${MYSQL_USER:-trendscope}:${MYSQL_PASSWORD:-trendscope123}@mysql:3306/${MYSQL_DATABASE:-trend_scope}
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-jwt-secret-change-in-production}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "alembic upgrade head && python seed_data.py && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app"
    networks:
      - trend-scope-network

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: trend-scope-admin
    restart: unless-stopped
    ports:
      - "${ADMIN_PORT:-3000}:3000"
    volumes:
      - ./admin:/app
      - /app/node_modules
      - /app/.next
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
    depends_on:
      - backend
    command: npm run dev
    networks:
      - trend-scope-network

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  trend-scope-network:
    driver: bridge
